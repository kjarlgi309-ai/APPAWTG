# TourAPI 매칭/필드 확인용 (수동 실행) — .github/workflows/enrich.yml 로 저장
# 저장소 Settings → Secrets and variables → Actions 에 TOUR_API_KEY 를 먼저 등록하세요.
name: Enrich probe (TourAPI)
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 1곳 상세 응답 확인(probe)
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
        run: node tools/enrich.mjs --probe 국립과천과학관
      - name: 60곳 샘플 수집(매칭률 확인)
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
        run: node tools/enrich.mjs --limit 60
      - name: 결과 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: info_auto
          path: info_auto.js
