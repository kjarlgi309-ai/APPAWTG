<style>

  }
  *{margin:0;padding:0;box-sizing:border-box}

  .tagline{color:var(--sub);font-size:15px}

  .random-btn{display:block;width:100%;margin:22px 0 8px;padding:16px;border:none;border-radius:16px;

    font-size:13px;font-weight:600;color:#5d564e;cursor:pointer;white-space:nowrap;transition:.15s}
  .chip.on{background:var(--chip-on);color:#fff}
  .search{width:100%;margin-top:8px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff;outline:none}
  .search:focus{border-color:var(--accent)}

  .count-row{display:flex;align-items:center;justify-content:space-between;margin:14px 2px 10px}
  .count{font-size:13px;color:var(--sub)}
  .fav-filter{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:#5d564e;cursor:pointer}
  .fav-filter.on{background:#e0245e;border-color:#e0245e;color:#fff}
  .fav-btn{position:absolute;top:12px;right:12px;border:none;background:none;font-size:20px;cursor:pointer;line-height:1;padding:4px}
  .near-banner{display:none;margin:0 0 10px;padding:9px 12px;background:var(--accent-soft);border-radius:10px;font-size:13px;font-weight:600;color:#6b5a4e}
  .near-banner button{float:right;border:none;background:none;font-weight:800;cursor:pointer;color:#d4541a;font-size:13px}
  .map-link.near{border-style:dashed;background:none;cursor:pointer;font-family:inherit}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;transition:.15s;position:relative}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.06)}

  .card .loc{font-size:13px;color:var(--accent);font-weight:700}
  .card p{font-size:13.5px;color:#6b6359;margin:8px 0 12px;min-height:40px}
  .tags{display:flex;flex-wrap:wrap;gap:5px}

  .map-link{display:inline-block;font-size:12.5px;font-weight:700;color:var(--ink);text-decoration:none;

  .w-title span{color:var(--accent)}
  .w-days{display:flex;gap:10px;margin-top:10px}

  .w-day .i{font-size:26px;margin:4px 0}
  .w-day .t{font-size:14px;font-weight:800}
  .w-day .t small{color:var(--sub);font-weight:600}
  .w-day .r{font-size:11px;color:#5b8def;font-weight:700;margin-top:2px}
  .w-tip{margin-top:10px;font-size:12.5px;color:#6b5a4e;background:var(--accent-soft);border-radius:8px;padding:8px 10px}
  .w-tip button{border:none;background:var(--accent);color:#fff;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;cursor:pointer;margin-left:4px}

  .btn-go{border:none;background:var(--accent);color:#fff}

</head>

const state={region:"all",place:"all",age:"all",cost:"all",q:"",favOnly:false,near:null};

// ===== 찜하기 (브라우저에 저장) =====
let FAVS=[];try{FAVS=JSON.parse(localStorage.getItem("appawtg_favs")||"[]");}catch(e){}
function isFav(n){return FAVS.includes(n);}
function toggleFav(n){
  const i=FAVS.indexOf(n);
  if(i<0){FAVS.push(n);if(typeof gtag==="function")gtag('event','fav_add');}
  else FAVS.splice(i,1);
  try{localStorage.setItem("appawtg_favs",JSON.stringify(FAVS));}catch(e){}
  render();
}
function toggleFavOnly(){
  state.favOnly=!state.favOnly;
  document.getElementById("favToggle").classList.toggle("on",state.favOnly);
  render();
}

// ===== 근처 장소 (좌표 기반, 반경 15km) =====
function dist(a,b){const dx=(a.x-b.x)*88.8,dy=(a.y-b.y)*111.1;return Math.sqrt(dx*dx+dy*dy);}
let NEAR_COUNT=null;
function nearCount(p){
  if(!NEAR_COUNT){
    NEAR_COUNT={};const cs=PLACES.filter(q=>q.y);
    cs.forEach(q=>{NEAR_COUNT[q.n]=cs.filter(o=>o!==q&&dist(q,o)<=15).length;});
  }
  return NEAR_COUNT[p.n]||0;
}
function showNear(n){
  const p=PLACES.find(q=>q.n===n);if(!p||!p.y)return;
  state.near=p;
  if(typeof gtag==="function")gtag('event','nearby_view');
  render();
  document.getElementById("nearBanner").scrollIntoView({behavior:"smooth",block:"center"});
}
function clearNear(){state.near=null;render();}

function shortName(name){return name.split("+")[0].trim();}
function mapUrl(name){return "https://map.naver.com/p/search/"+encodeURIComponent(shortName(name));}
// 좌표(x:경도, y:위도) 있으면 길안내 직링크, 없으면 검색 링크
function kakaoUrl(p){
  const n=encodeURIComponent(shortName(p.n));
  return p.y?`https://map.kakao.com/link/map/${n},${p.y},${p.x}`:`https://map.kakao.com/link/search/${n}`;
}
function googleUrl(p){
  return p.y?`https://www.google.com/maps/dir/?api=1&destination=${p.y},${p.x}`:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shortName(p.n))}`;
}
function foodUrl(p){
  return "https://map.naver.com/p/search/"+encodeURIComponent(shortName(p.n)+" 근처 맛집");
}

let LAST_DIST={};
function filtered(){
  if(state.near){ // 근처 모드: 다른 필터 무시, 거리순 정렬
    LAST_DIST={};
    return PLACES.filter(x=>x.y&&x.n!==state.near.n&&dist(x,state.near)<=15)
      .map(x=>{LAST_DIST[x.n]=dist(x,state.near);return x;})
      .sort((a,b)=>LAST_DIST[a.n]-LAST_DIST[b.n]);
  }
  return PLACES.filter(x=>{
    if(state.favOnly&&!isFav(x.n))return false;
    if(state.region!=="all"&&x.r!==state.region)return false;
    if(state.place!=="all"&&x.p!==state.place&&x.p!=="혼합")return false;

      const s=(x.n+x.l+x.d+x.t.join("")).toLowerCase();
      if(!s.includes(state.q.toLowerCase()))return false;
    }
    return true;
  });

const REGION_GEO={
  all:["서울 기준",37.57,126.98],"수도권":["서울 기준",37.57,126.98],
  "강원":["춘천 기준",37.88,127.73],"충청":["대전 기준",36.35,127.38],
  "경상":["부산 기준",35.18,129.08],"전라":["광주 기준",35.16,126.85],
  "제주":["제주시 기준",33.50,126.53]
};
const DOW=["일","월","화","수","목","금","토"];
function wmo(c){
  if(c===0)return["☀️","맑음"];
  if(c<=2)return["🌤️","구름 조금"];
  if(c===3)return["☁️","흐림"];
  if(c<=48)return["🌫️","안개"];
  if(c<=57)return["🌦️","이슬비"];
  if(c<=67)return["🌧️","비"];
  if(c<=77)return["🌨️","눈"];
  if(c<=82)return["🌦️","소나기"];
  if(c<=86)return["🌨️","눈"];
  return["⛈️","뇌우"];
}
const wCache={};
async function loadWeather(){
  const key=state.region in REGION_GEO?state.region:"all";
  const [label,lat,lon]=REGION_GEO[key];
  try{
    let d=wCache[key];
    if(!d){
      const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=10`);
      d=(await res.json()).daily;wCache[key]=d;
    }
    // 다가오는 토·일 찾기 (오늘이 주말이면 오늘부터)
    const days=[];
    for(let i=0;i<d.time.length&&days.length<2;i++){
      const dow=new Date(d.time[i]+"T00:00:00").getDay();
      if(dow===6||dow===0)days.push(i);
    }
    document.getElementById("wCity").textContent=label;
    document.getElementById("wDays").innerHTML=days.map(i=>{
      const dt=new Date(d.time[i]+"T00:00:00"),dw=dt.getDay();
      const [icon,txt]=wmo(d.weather_code[i]);
      return `<div class="w-day">
        <div class="d ${dw===6?'sat':'sun'}">${dt.getMonth()+1}/${dt.getDate()} (${DOW[dw]})</div>
        <div class="i">${icon}</div>
        <div class="t">${Math.round(d.temperature_2m_max[i])}° <small>/ ${Math.round(d.temperature_2m_min[i])}°</small></div>
        <div class="r">${txt} · 강수 ${d.precipitation_probability_max[i]}%</div>
      </div>`;
    }).join("");
    // 한 줄 팁
    const rainy=days.filter(i=>d.precipitation_probability_max[i]>=50||d.weather_code[i]>=51);
    const hot=days.some(i=>d.temperature_2m_max[i]>=30);
    const cold=days.some(i=>d.temperature_2m_min[i]<=0);
    const tip=document.getElementById("wTip");
    if(rainy.length){
      const names=rainy.map(i=>DOW[new Date(d.time[i]+"T00:00:00").getDay()]+"요일").join("·");
      tip.innerHTML=`☔ ${names}에 비 소식이 있어요. 실내 위주로 짜볼까요? <button onclick="applyIndoor()">실내만 보기</button>`;
    }else if(hot){
      tip.textContent="🥵 한낮이 더워요. 물놀이나 시원한 실내, 또는 오전 일찍 움직이는 걸 추천!";
    }else if(cold){
      tip.textContent="🧤 쌀쌀해요. 장갑·핫팩 챙기고 실내 코스를 섞어보세요.";
    }else{
      tip.textContent="🙆 나들이 가기 좋은 날씨예요. 실외 명소를 노려보세요!";
    }
    document.getElementById("weather").style.display="block";
  }catch(e){/* 오프라인 등 실패 시 위젯 숨김 유지 */}
}
function applyIndoor(){
  state.place="실내";
  const row=document.querySelector('.frow[data-key="place"]');
  row.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c.dataset.v==="실내"));
  render();
  document.getElementById("grid").scrollIntoView({behavior:"smooth"});

    elMsg.className = "rv-msg" + (type ? " " + type : "");
  }

  async function openReviews(name) {
    curPlace = name;
    curRating = 0;
    [...elRate.querySelectorAll("b")].forEach(x => x.classList.remove("on"));
    elTitle.textContent = name;
    elSub.textContent = "";
    setMsg("");
    elText.value = ""; elNick.value = lsGet("rv_nick", "") || "";
    elBg.classList.add("show");
    document.body.style.overflow = "hidden";
    if (typeof gtag === "function") gtag("event", "review_open", { place: name });

    if (!CONFIGURED) {
      elForm.style.display = "none";
      elList.innerHTML = `<div class="rv-note">
        한줄평 기능은 <b>Firebase 연결 후</b> 켜집니다.<br>
        <code>reviews.js</code> 파일의 <code>firebaseConfig</code>에 본인 값을 넣어주세요.<br>
        (함께 드린 <b>한줄평_설치가이드.md</b> 참고)</div>`;
      return;
    }
    elForm.style.display = "";
    await loadList(name);
  }

  async function loadList(name) {
    elList.innerHTML = `<div class="rv-empty">불러오는 중…</div>`;
    try {
      const { fs, db } = await initFirebase();
      const q = fs.query(
        fs.collection(db, "reviews"),
        fs.where("place", "==", name),
        fs.limit(FETCH_N)
      );
      const snap = await fs.getDocs(q);
      const rows = [];
      snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
      const visible = rows
        .filter(r => (r.reports || 0) < HIDE_AT)
        .sort((a, b) => (b.ts && b.ts.seconds || 0) - (a.ts && a.ts.seconds || 0));
      renderList(visible);
    } catch (e) {
      console.error("[리뷰] 불러오기 실패", e);
      elList.innerHTML = `<div class="rv-empty">한줄평을 불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>`;
    }
  }

  function renderList(rows) {
    const n = rows.length;
    elSub.textContent = n ? `한줄평 ${n}개` : "아직 한줄평이 없어요";
    if (!n) {
      elList.innerHTML = `<div class="rv-empty">첫 한줄평을 남겨보세요! 🙌<br>다녀온 분의 한 줄이 다음 가족에게 큰 도움이 돼요.</div>`;
      return;
    }
    elList.innerHTML = rows.map(r => `
      <div class="rv-item">
        <div class="rv-top">
          <span class="rv-nick">${esc(r.nick || "익명")}</span>
          ${r.rating ? `<span class="rv-star">${stars(r.rating)}</span>` : ""}
          <span class="rv-time">${timeAgo(r.ts)}</span>
        </div>
        <div class="rv-text">${esc(r.text)}</div>
        <button class="rv-report" data-id="${esc(r.id)}">🚩 신고</button>
      </div>`).join("");
    elList.querySelectorAll(".rv-report").forEach(b =>
      b.addEventListener("click", () => reportReview(b.dataset.id)));
  }

  async function submitReview() {
    if (loading) return;
    const text = elText.value.trim();
    const nick = (elNick.value.trim() || "익명").slice(0, 16);
    if (elHp.value) { closeModal(); return; }
    if (text.length < 2) { setMsg("한줄평을 2글자 이상 적어주세요.", "err"); return; }
    if (text.length > MAX_LEN) { setMsg(`${MAX_LEN}자 이내로 적어주세요.`, "err"); return; }
    const low = text.toLowerCase();
    if (BAD_WORDS.some(w => low.includes(w))) { setMsg("부적절한 표현이 포함되어 있어요.", "err"); return; }
    const last = lsGet("rv_last", 0);
    if (Date.now() - last < COOLDOWN) { setMsg("잠시 후 다시 시도해주세요.", "err"); return; }
    const done = lsGet("rv_done", []);
    if (done.includes(curPlace)) { setMsg("이 장소에는 이미 한줄평을 남기셨어요. 감사합니다 🙏", "err"); return; }

    loading = true; elSend.disabled = true; setMsg("올리는 중…");
    try {
      const { fs, db } = await initFirebase();
      await fs.addDoc(fs.collection(db, "reviews"), {
        place: curPlace, text: text, nick: nick, rating: curRating | 0, reports: 0, ts: fs.serverTimestamp()
      });
      lsSet("rv_last", Date.now());
      lsSet("rv_nick", nick === "익명" ? "" : nick);
      done.push(curPlace); lsSet("rv_done", done);
      if (typeof gtag === "function") gtag("event", "review_add", { place: curPlace });
      if (RV_COUNTS) { RV_COUNTS[curPlace] = (RV_COUNTS[curPlace] || 0) + 1; paintCounts(); }
      elText.value = ""; curRating = 0;
      [...elRate.querySelectorAll("b")].forEach(x => x.classList.remove("on"));
      setMsg("등록됐어요. 고맙습니다! 🙌", "ok");
      await loadList(curPlace);
    } catch (e) {
      console.error("[리뷰] 등록 실패", e);
      setMsg("등록에 실패했어요. 잠시 후 다시 시도해주세요.", "err");
    } finally {
      loading = false; elSend.disabled = false;
    }
  }

  async function reportReview(id) {
    const reported = lsGet("rv_reported", []);
    if (reported.includes(id)) { setMsg("이미 신고한 한줄평이에요.", "err"); return; }
    if (!confirm("이 한줄평을 신고할까요? (욕설·광고·허위 등)")) return;
    try {
      const { fs, db } = await initFirebase();
      await fs.updateDoc(fs.doc(db, "reviews", id), { reports: fs.increment(1) });
      reported.push(id); lsSet("rv_reported", reported);
      if (typeof gtag === "function") gtag("event", "review_report");
      setMsg("신고 접수됐어요. 확인 후 조치할게요.", "ok");
      await loadList(curPlace);
    } catch (e) {
      console.error("[리뷰] 신고 실패", e);
      setMsg("신고 처리에 실패했어요.", "err");
    }
  }

  // ===== 카드에 한줄평 개수 표시 =====
  let RV_COUNTS = null;
  function paintCounts() {
    if (!RV_COUNTS) return;
    document.querySelectorAll("#grid h3.rv-open").forEach(h => {
      const sign = h.querySelector(".rv-sign");
      if (!sign) return;
      const c = RV_COUNTS[h.dataset.n] || 0;
      sign.textContent = c ? `💬 한줄평 ${c}` : "💬 한줄평";
    });
  }
  async function loadCounts() {
    if (!CONFIGURED) return;
    try {
      const { fs, db } = await initFirebase();
      const snap = await fs.getDocs(fs.collection(db, "reviews"));
      const m = {};
      snap.forEach(d => { const pl = d.data().place; if (pl) m[pl] = (m[pl] || 0) + 1; });
      RV_COUNTS = m;
      paintCounts();
      const grid = document.getElementById("grid");
      if (grid) new MutationObserver(paintCounts).observe(grid, { childList: true });
    } catch (e) { console.error("[리뷰] 개수 로드 실패", e); }
  }

  // ===== 장소명 클릭 → 한줄평 창 열기 (이벤트 위임) =====
  function wireGrid() {
    const grid = document.getElementById("grid");
    if (!grid) return;
    grid.addEventListener("click", (e) => {
      const t = e.target.closest(".rv-open, .rv-btn");
      if (!t) return;
      e.preventDefault();
      openReviews(t.dataset.n);
    });
  }

  // ===== 초기화 (중복 실행 방지) =====
  function start() {
    if (window.__rvInit) return;
    window.__rvInit = true;
    injectCSS();
    buildModal();
    wireGrid();
    loadCounts();
    window.openReviews = openReviews;
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();

</script>
</body>
</html>
