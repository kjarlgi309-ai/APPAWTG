<style>
  :root{
    --bg:#faf8f5; --card:#ffffff; --ink:#2b2620; --sub:#8a8178;

    --chip:#f3eee7; --chip-on:#2b2620;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 80px}

  header{padding:36px 0 8px;text-align:center}
  .logo{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:-.3px}
  h1{font-size:clamp(26px,6vw,38px);font-weight:800;letter-spacing:-1px;margin:10px 0 6px}
  h1 em{font-style:normal;color:var(--accent)}
  .tagline{color:var(--sub);font-size:15px}

  .random-btn{display:block;width:100%;margin:22px 0 8px;padding:16px;border:none;border-radius:16px;
    background:linear-gradient(135deg,#ff6b35,#ff8f5e);color:#fff;font-size:17px;font-weight:800;cursor:pointer;
    box-shadow:0 6px 18px rgba(255,107,53,.3);transition:transform .15s}
  .random-btn:active{transform:scale(.97)}

  .filters{position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:10;border-bottom:1px solid var(--line)}
  .frow{display:flex;gap:6px;overflow-x:auto;padding:3px 0;scrollbar-width:none}
  .frow::-webkit-scrollbar{display:none}
  .flabel{flex:0 0 auto;font-size:12px;color:var(--sub);font-weight:700;align-self:center;min-width:34px;white-space:nowrap}
  .chip{flex:0 0 auto;padding:7px 13px;border-radius:99px;background:var(--chip);border:1px solid transparent;
    font-size:13px;font-weight:600;color:#5d564e;cursor:pointer;white-space:nowrap;transition:.15s}
  .chip.on{background:var(--chip-on);color:#fff}
  .search{width:100%;margin-top:8px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff;outline:none}
  .search:focus{border-color:var(--accent)}

  .count{font-size:13px;color:var(--sub);margin:14px 2px 10px}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;transition:.15s;position:relative}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.06)}
  .card .emoji{font-size:30px}
  .card h3{font-size:17px;font-weight:800;margin:8px 0 2px;letter-spacing:-.4px}
  .card .loc{font-size:13px;color:var(--accent);font-weight:700}
  .card p{font-size:13.5px;color:#6b6359;margin:8px 0 12px;min-height:40px}
  .tags{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:11px;padding:4px 8px;border-radius:6px;background:var(--chip);color:#7a7268;font-weight:600}
  .tag.free{background:#e8f5e9;color:#2e7d32}
  .map-link{display:inline-block;margin-top:12px;font-size:13px;font-weight:700;color:var(--ink);text-decoration:none;
    border:1.5px solid var(--ink);border-radius:8px;padding:6px 12px}
  .map-link:hover{background:var(--ink);color:#fff}

  .empty{text-align:center;padding:60px 0;color:var(--sub)}

  /* 주말 날씨 위젯 */
  .weather{margin:14px 0 4px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 16px;text-align:left}
  .w-title{font-size:13px;font-weight:800;color:var(--sub)}
  .w-title span{color:var(--accent)}
  .w-days{display:flex;gap:10px;margin-top:10px}
  .w-day{flex:1;background:var(--bg);border-radius:12px;padding:10px;text-align:center}
  .w-day .d{font-size:12px;font-weight:700;color:var(--sub)}

  .w-day .i{font-size:26px;margin:4px 0}
  .w-day .t{font-size:14px;font-weight:800}
  .w-day .t small{color:var(--sub);font-weight:600}
  .w-day .r{font-size:11px;color:#5b8def;font-weight:700;margin-top:2px}
  .w-tip{margin-top:10px;font-size:12.5px;color:#6b5a4e;background:var(--accent-soft);border-radius:8px;padding:8px 10px}
  .w-tip button{border:none;background:var(--accent);color:#fff;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;cursor:pointer;margin-left:4px}

  /* 랜덤 추천 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:20px;padding:30px 24px;max-width:400px;width:100%;text-align:center;animation:pop .25s}

  .modal .emoji{font-size:52px}
  .modal h3{font-size:22px;margin:10px 0 4px}
  .modal .loc{color:var(--accent);font-weight:700;font-size:14px}
  .modal p{font-size:14px;color:#6b6359;margin:10px 0 16px}
  .modal-btns{display:flex;gap:8px;justify-content:center}
  .modal-btns button,.modal-btns a{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none}
  .btn-again{border:1.5px solid var(--line);background:#fff;color:var(--ink)}
  .btn-go{border:none;background:var(--accent);color:#fff}

  footer{text-align:center;margin-top:50px;font-size:12px;color:var(--sub)}
  footer a{color:var(--sub)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>아빠, <em>이번 주말</em> 어디가?</h1>
    <p class="tagline">고민은 3초면 충분해요. 조건만 고르세요.</p>
    <button class="random-btn" onclick="randomPick()">🎲 고민 끝! 랜덤으로 정해줘</button>
    <div class="weather" id="weather" style="display:none">

      <div class="w-days" id="wDays"></div>
      <div class="w-tip" id="wTip"></div>
    </div>
  </header>

  <div class="filters">
    <div class="frow" data-key="region">
      <span class="flabel">지역</span>
      <button class="chip on" data-v="all">전체</button>
      <button class="chip" data-v="수도권">수도권</button>
      <button class="chip" data-v="강원">강원</button>
      <button class="chip" data-v="충청">충청</button>
      <button class="chip" data-v="경상">경상</button>
      <button class="chip" data-v="전라">전라</button>
      <button class="chip" data-v="제주">제주</button>
    </div>
    <div class="frow" data-key="place">
      <span class="flabel">장소</span>
      <button class="chip on" data-v="all">전체</button>
      <button class="chip" data-v="실내">☔ 실내 (비와도 OK)</button>
      <button class="chip" data-v="실외">☀️ 실외</button>
    </div>
    <div class="frow" data-key="age">
      <span class="flabel">나이</span>
      <button class="chip on" data-v="all">전체</button>
      <button class="chip" data-v="유아">유아 (0~6세)</button>
      <button class="chip" data-v="초등">초등학생</button>
    </div>
    <div class="frow" data-key="cost">
      <span class="flabel">예산</span>
      <button class="chip on" data-v="all">전체</button>
      <button class="chip" data-v="무료">무료</button>
      <button class="chip" data-v="가성비">가성비 (1만원↓)</button>
      <button class="chip" data-v="플렉스">플렉스</button>
    </div>
    <input class="search" id="q" placeholder="🔍 장소 이름이나 키워드 검색 (예: 공룡, 물놀이, 기차)">
  </div>

  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">조건에 맞는 곳이 없어요 😢<br>필터를 조금 풀어보세요.</div>

  <footer>
    <p>입장료·운영시간은 변동될 수 있어요. 방문 전 공식 정보를 꼭 확인하세요.</p>
    <p style="margin-top:6px">© 2026 APPAWTG (APPA, Where To Go?) · 문의: kjarlgi309@gmail.com</p>
  </footer>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="emoji" id="mEmoji"></div>
    <h3 id="mName"></h3>
    <div class="loc" id="mLoc"></div>
    <p id="mDesc"></p>
    <div class="modal-btns">
      <button class="btn-again" onclick="randomPick()">🎲 다시!</button>
      <a class="btn-go" id="mMap" target="_blank">지도 보기</a>
    </div>
  </div>
</div>

const state={region:"all",place:"all",age:"all",cost:"all",q:""};
const grid=document.getElementById("grid"), count=document.getElementById("count"), empty=document.getElementById("empty");

function mapUrl(name){return "https://map.naver.com/p/search/"+encodeURIComponent(name.split("+")[0].trim());}

function filtered(){
  return PLACES.filter(x=>{
    if(state.region!=="all"&&x.r!==state.region)return false;
    if(state.place!=="all"&&x.p!==state.place&&x.p!=="혼합")return false;
    if(state.age!=="all"&&!x.a.includes(state.age))return false;
    if(state.cost!=="all"&&x.c!==state.cost)return false;
    if(state.q){
      const s=(x.n+x.l+x.d+x.t.join("")).toLowerCase();
      if(!s.includes(state.q.toLowerCase()))return false;
    }
    return true;
  });
}

function render(){
  const list=filtered();
  count.textContent=`${list.length}곳을 찾았어요`;
  empty.style.display=list.length?"none":"block";
  grid.innerHTML=list.map(x=>`
    <div class="card">
      <div class="emoji">${x.e}</div>
      <h3>${x.n}</h3>
      <div class="loc">📍 ${x.l}</div>
      <p>${x.d}</p>
      <div class="tags">
        <span class="tag ${x.c==='무료'?'free':''}">${x.c==='무료'?'💸 무료':x.c==='가성비'?'💰 1만원↓':'💳 플렉스'}</span>
        <span class="tag">${x.p==='실내'?'☔ 실내':x.p==='실외'?'☀️ 실외':'⛅ 실내+실외'}</span>
        ${x.t.map(t=>`<span class="tag">#${t}</span>`).join("")}
      </div>
      <a class="map-link" href="${mapUrl(x.n)}" target="_blank" rel="noopener">네이버 지도에서 보기 →</a>
    </div>`).join("");
}

// ===== 주말 날씨 (Open-Meteo, 무료·키 불필요) =====
const REGION_GEO={
  all:["서울 기준",37.57,126.98],"수도권":["서울 기준",37.57,126.98],
  "강원":["춘천 기준",37.88,127.73],"충청":["대전 기준",36.35,127.38],
  "경상":["부산 기준",35.18,129.08],"전라":["광주 기준",35.16,126.85],
  "제주":["제주시 기준",33.50,126.53]
};
const DOW=["일","월","화","수","목","금","토"];
function wmo(c){
  if(c===0)return["☀️","맑음"];
  if(c<=2)return["🌤️","구름 조금"];
  if(c===3)return["☁️","흐림"];
  if(c<=48)return["🌫️","안개"];
  if(c<=57)return["🌦️","이슬비"];
  if(c<=67)return["🌧️","비"];
  if(c<=77)return["🌨️","눈"];
  if(c<=82)return["🌦️","소나기"];
  if(c<=86)return["🌨️","눈"];
  return["⛈️","뇌우"];
}
const wCache={};
async function loadWeather(){
  const key=state.region in REGION_GEO?state.region:"all";
  const [label,lat,lon]=REGION_GEO[key];
  try{
    let d=wCache[key];
    if(!d){
      const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=10`);
      d=(await res.json()).daily;wCache[key]=d;
    }
    // 다가오는 토·일 찾기 (오늘이 주말이면 오늘부터)
    const days=[];
    for(let i=0;i<d.time.length&&days.length<2;i++){
      const dow=new Date(d.time[i]+"T00:00:00").getDay();
      if(dow===6||dow===0)days.push(i);
    }
    document.getElementById("wCity").textContent=label;
    document.getElementById("wDays").innerHTML=days.map(i=>{
      const dt=new Date(d.time[i]+"T00:00:00"),dw=dt.getDay();
      const [icon,txt]=wmo(d.weather_code[i]);
      return `<div class="w-day">
        <div class="d ${dw===6?'sat':'sun'}">${dt.getMonth()+1}/${dt.getDate()} (${DOW[dw]})</div>
        <div class="i">${icon}</div>
        <div class="t">${Math.round(d.temperature_2m_max[i])}° <small>/ ${Math.round(d.temperature_2m_min[i])}°</small></div>
        <div class="r">${txt} · 강수 ${d.precipitation_probability_max[i]}%</div>
      </div>`;
    }).join("");
    // 한 줄 팁
    const rainy=days.filter(i=>d.precipitation_probability_max[i]>=50||d.weather_code[i]>=51);
    const hot=days.some(i=>d.temperature_2m_max[i]>=30);
    const cold=days.some(i=>d.temperature_2m_min[i]<=0);
    const tip=document.getElementById("wTip");
    if(rainy.length){
      const names=rainy.map(i=>DOW[new Date(d.time[i]+"T00:00:00").getDay()]+"요일").join("·");
      tip.innerHTML=`☔ ${names}에 비 소식이 있어요. 실내 위주로 짜볼까요? <button onclick="applyIndoor()">실내만 보기</button>`;
    }else if(hot){
      tip.textContent="🥵 한낮이 더워요. 물놀이나 시원한 실내, 또는 오전 일찍 움직이는 걸 추천!";
    }else if(cold){
      tip.textContent="🧤 쌀쌀해요. 장갑·핫팩 챙기고 실내 코스를 섞어보세요.";
    }else{
      tip.textContent="🙆 나들이 가기 좋은 날씨예요. 실외 명소를 노려보세요!";
    }
    document.getElementById("weather").style.display="block";
  }catch(e){/* 오프라인 등 실패 시 위젯 숨김 유지 */}
}
function applyIndoor(){
  state.place="실내";
  const row=document.querySelector('.frow[data-key="place"]');
  row.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c.dataset.v==="실내"));
  render();
  document.getElementById("grid").scrollIntoView({behavior:"smooth"});
}

render();
loadWeather();
</script>
</body>
</html>
